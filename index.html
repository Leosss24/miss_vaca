<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Miss Vaca 2026 🐄</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Votaciones Miss Vaca 2026 🐄</h1>
  <div class="twitch-banner">
    <a
      id="twitch-link"
      href="https://www.twitch.tv/mery_soldier"
      target="_blank">
      www.twitch.tv/mery_soldier
    </a>
  </div>

  <!-- Login -->
  <div id="login-container" style="text-align:center;">
    <h2>Ingresa tu nombre para votar</h2>
    <label for="nombre-usuario">Tu nombre:</label><br>
    <input type="text" id="nombre-usuario" placeholder="Tu nombre" /><br><br>
    <button id="btn-login" type="button">Entrar</button>
  </div>

  <!-- App principal -->
  <div id="main-container" style="display:none;">
  <div id="vacas-container"></div>

  <div id="lateral">
    <div id="twitch-player">
      <iframe
        src="https://player.twitch.tv/?channel=mery_soldier&parent=leosss24.github.io"
        allowfullscreen="true"
        scrolling="no"
        frameborder="0">
      </iframe>
    </div>

    <div id="resultados"></div>
  </div>
</div>

  <!-- Botón de cerrar sesión abajo -->
  <div id="logout-wrapper" style="display:none; text-align:center; margin-top: 2rem;">
    <button id="btn-logout">Cerrar sesión</button>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
